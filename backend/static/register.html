<!doctype html><html><head><meta charset="utf-8"><title>Register</title><link rel="stylesheet" href="/style.css"></head><body>
<h1>Register</h1><a href="/">Home</a>
<form id="f"><input name="username" placeholder="username" required><br><input name="password" type="password" placeholder="password" required><br><button>Create Account</button></form>
<div id="msg"></div>
<script>
document.getElementById('f').onsubmit=async(e)=>{e.preventDefault();const b=new URLSearchParams(new FormData(e.target));const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:b});document.getElementById('msg').textContent=await r.text();};
</script>
</body></html>
